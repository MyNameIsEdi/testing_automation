name: Playwright E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: playwright install --with-deps

    # הוסר השלב של הרצת השרת הלוקאלי - אנחנו עוברים ישר להרצת הבדיקות

    - name: Run Pytest suite
      run: pytest --html=report.html
      env:
        # כאן תוכל להגדיר משתני סביבה שהטסטים שלך צריכים, למשל את כתובת האתר
        BASE_URL: "https://sv-students-recommend.onrender.com"
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    - name: Upload Test Report & Traces
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: |
          report.html
          test-results/
        retention-days: 30
